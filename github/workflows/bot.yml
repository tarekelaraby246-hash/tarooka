name: Run Bot
on:
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *'
jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - run: pip install -r requirements.txt
      - run: timeout 21000 python GROK_bot-1.py
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
